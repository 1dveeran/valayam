<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valayam UI Proxy</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #f1f5f9; padding: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 1rem; }
        h1 { color: #38bdf8; }
        .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; background: #10b981; color: #064e3b; }
    </style>
</head>
<body>
    <h1>Valayam UI Proxy</h1>
    
    <div class="card">
        <h2>Engine Status</h2>
        <p>Status: <span id="status" class="badge">Loading...</span></p>
        <p>Active Proxies: <span id="proxies">0</span></p>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('status').innerText = data.status.toUpperCase();
                document.getElementById('proxies').innerText = data.active_proxies;
            } catch (err) {
                document.getElementById('status').innerText = 'OFFLINE';
                document.getElementById('status').style.background = '#ef4444';
                document.getElementById('status').style.color = '#7f1d1d';
            }
        }

        // Poll every 5 seconds
        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
