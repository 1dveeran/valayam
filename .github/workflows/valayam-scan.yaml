name: Valayam Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Run Valayam Scan
      uses: valayam/valayam-action@v1
      with:
        target: "http://staging.example.com"
        format: "html"
        output: "report.html"

    - name: Upload HTML Report
      uses: actions/upload-artifact@v3
      with:
        name: valayam-report
        path: report.html
