id: tcp-banner-grab
info:
  name: "TCP Banner Grab and Detect"
  severity: "Info"
  description: "Connects to TCP ports and grabs the banner to detect the service version."
network:
  - host: "{{Hostname}}"
    ports:
      - "22"
      - "21"
      - "3306"
    protocol: "tcp"
    banner_timeout_ms: 2000
    matchers:
      - type: "regex"
        part: "body"
        regex:
          - "SSH-2\\.0"
          - "vsFTPd"
          - "mysql_native_password"
