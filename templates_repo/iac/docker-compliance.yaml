id: iac-docker-compliance
info:
  name: "Dockerfile IaC Security Audit"
  severity: "Medium"
  description: "Audits Dockerfiles for security best practices including root user, exposed secrets, and base image vulnerabilities."
iac_audit:
  - target: "Dockerfile"
    r#type: "docker"
    matchers:
      - type: word
        part: body
        words:
          - "misconfiguration"
          - "violation"