id: client-secret-audit
info:
  name: "Client Secret Exposure Audit"
  severity: "High"
  description: "Audits client-side code and responses for exposed API keys, client secrets, and tokens."
  compliance:
    cwe: "CWE-798"
client_secret_audit:
  - target: "https://{{Hostname}}"
  - target: "https://{{Hostname}}/static"
  - target: "https://{{Hostname}}/assets"