id: dns-subdomain-enum
info:
  name: "DNS Subdomain Enumeration"
  severity: "Info"
  description: "Enumerates common subdomains via DNS A/AAAA records to discover hidden or unmanaged assets."
dns:
  - domain: "www.{{Hostname}}"
    query_type: "A"
    matchers:
      - type: word
        part: body
        words:
          - "IN"
      - type: status
        part: status
        status:
          - 200
    matcher_condition: and

