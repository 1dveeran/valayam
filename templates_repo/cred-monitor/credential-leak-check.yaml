id: cred-monitor-domain
info:
  name: "Credential Leak Monitoring"
  severity: "Critical"
  description: "Monitors for exposed credentials associated with the target domain across known breach sources."
  compliance:
    cwe: "CWE-540"
cred_monitor:
  - target_domain: "{{Hostname}}"
    emails:
      - "admin@{{Hostname}}"
      - "info@{{Hostname}}"
      - "contact@{{Hostname}}"
      - "support@{{Hostname}}"
      - "noreply@{{Hostname}}"